name: Release skill

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build .skill
        run: make build

      - name: Compute version tag
        id: version
        run: |
          short_sha=$(git rev-parse --short=7 HEAD)
          stamp=$(date -u +%Y.%m.%d-%H%M%S)
          tag="v${stamp}-${short_sha}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: dist/thai-suno-songwriter.skill
          fail_on_unmatched_files: true
          make_latest: 'true'
          body: |
            Build from `main` commit `${{ github.sha }}`.

            ดาวน์โหลด `thai-suno-songwriter.skill` ด้านล่าง แล้วแตกเข้า `~/.claude/skills/`
            Download `thai-suno-songwriter.skill` below and extract into `~/.claude/skills/`.
